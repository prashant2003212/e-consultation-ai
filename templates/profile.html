<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>User Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
  margin:0;
  min-height:100vh;
  font-family:"Inter","Segoe UI",sans-serif;

  background:
    radial-gradient(circle at 20% 20%, #092d47 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, #042940 0%, transparent 40%),
    linear-gradient(135deg,#11566b,#1e293b);
  color:white;
}

/* container */
.container-box{
  max-width:1000px;
  margin:90px auto;
  padding:20px;
}

/* glass card */
.glass{
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(25px);
  border-radius:24px;
  padding:28px;
  border:1px solid rgba(255,255,255,0.25);
  margin-bottom:25px;

  box-shadow:
    0 20px 60px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.2);
}

/* profile header */
.profile-header{
  display:flex;
  align-items:center;
  gap:20px;
}

/* profile image */
.profile-img{
  width:100px;
  height:100px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid rgba(255,255,255,0.4);
  box-shadow:0 0 20px rgba(255,255,255,0.3);
}

/* name */
.name{
  font-size:24px;
  font-weight:700;
}

/* mobile */
.mobile{
  color:#cbd5e1;
}

/* stats */
.stats{
  display:flex;
  gap:20px;
  margin-top:20px;
}

.stat-card{
  flex:1;
  padding:15px;
  border-radius:16px;
  background: rgba(255,255,255,0.15);
  text-align:center;
}

.stat-number{
  font-size:22px;
  font-weight:700;
}

.stat-label{
  font-size:13px;
  color:#cbd5e1;
}

/* table */
.table{
  color:white;
  border-radius:12px;
  overflow:hidden;
}

.table thead{
  background: rgba(255,255,255,0.2);
}

.table tbody tr{
  background: rgba(255,255,255,0.05);
  transition:.2s;
}

.table tbody tr:hover{
  background: rgba(255,255,255,0.15);
}

/* logout btn */
.btn-logout{
  background: linear-gradient(135deg,#ef4444,#dc2626);
  border:none;
  border-radius:12px;
  padding:8px 16px;
  font-weight:600;
}

.btn-logout:hover{
  transform:translateY(-2px);
}

</style>
</head>

<body>

<div class="container-box">

  <!-- PROFILE CARD -->
  <div class="glass">

    <div class="profile-header">

      <!-- PROFILE IMAGE -->
      {% if image %}
        <img src="/{{image}}" class="profile-img">
      {% else %}
        <img src="https://via.placeholder.com/100" class="profile-img">
      {% endif %}

      <div>
        <div class="name">{{ name }}</div>
        <div class="mobile">{{ mobile }}</div>

        <a href="/logout" class="btn btn-logout btn-sm mt-2">Logout</a>
      </div>

    </div>

    <!-- STATS -->
    <div class="stats">

      <div class="stat-card">
        <div class="stat-number">{{ comments|length }}</div>
        <div class="stat-label">Total Comments</div>
      </div>

      <div class="stat-card">
        <div class="stat-number">Active</div>
        <div class="stat-label">User Status</div>
      </div>

    </div>

  </div>

  <!-- COMMENTS CARD -->
  <div class="glass">

    <h5 class="fw-bold mb-3">💬 Your Comments</h5>

    {% if comments %}

    <table class="table table-bordered">

      <thead>
        <tr>
          <th>Draft</th>
          <th>Comment</th>
        </tr>
      </thead>

      <tbody>
        {% for c in comments %}
        <tr>
          <td>{{ c.Draft }}</td>
          <td>{{ c.Comment }}</td>
        </tr>
        {% endfor %}
      </tbody>

    </table>

    {% else %}
      <p class="text-light">No comments yet.</p>
    {% endif %}

  </div>

</div>

</body>
</html>
