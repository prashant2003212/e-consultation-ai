<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>User Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* 🔥 SAME BACKGROUND AS REGISTER */
body {
  margin: 0;
  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  font-family: "Inter","Segoe UI",sans-serif;
  color: white;

  background:
    radial-gradient(circle at 20% 30%, rgba(99,102,241,0.25), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(168,85,247,0.25), transparent 40%),
    radial-gradient(circle at 50% 50%, rgba(14,165,233,0.15), transparent 60%),
    linear-gradient(135deg, #020617, #0f172a, #020617);

  background-attachment: fixed;
}

/* 🔥 SAME CARD STYLE */
.card {
  width: 700px;
  max-height: 90vh;
  overflow-y: auto;

  padding: 40px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(25px);

  border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.1);

  box-shadow:
    0 20px 80px rgba(0,0,0,0.7),
    inset 0 1px 0 rgba(255,255,255,0.1);
}

/* TITLE */
.title {
  font-size: 34px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 20px;

  background: linear-gradient(90deg, #ffffff, #6366f1, #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* USER INFO */
.user-info {
  text-align: center;
  margin-bottom: 25px;
  color: white;
}

.user-info div {
  margin: 5px 0;
}

/* TABLE */
.table {
  color: white;
}

.table thead {
  background: rgba(255,255,255,0.2);
}

.table tbody tr {
  background: rgba(255,255,255,0.05);
}

.table tbody tr:hover {
  background: rgba(255,255,255,0.15);
}

/* BUTTON */
.btn-main {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  border-radius: 14px;

  background: linear-gradient(135deg, #6366f1, #a855f7);
  border: none;
  color: white;
}

</style>
</head>

<body>

<div class="card">

  <div class="title">User Profile</div>

  <!-- USER INFO -->
  <div class="user-info">
    <div><strong>Name:</strong> {{ name }}</div>
    <div><strong>Mobile:</strong> {{ mobile }}</div>
    <div><strong>Total Comments:</strong> {{ comments|length }}</div>
  </div>

  <!-- COMMENTS -->
  <h5 class="mb-3" style="color: white;">💬 Your Comments</h5>

  {% if comments %}

  <table class="table table-bordered">

    <thead>
      <tr>
        <th>Draft</th>
        <th>Comment</th>
      </tr>
    </thead>

    <tbody>
      {% for c in comments %}
      <tr>
        <td>{{ c.Draft }}</td>
        <td>{{ c.Comment }}</td>
      </tr>
      {% endfor %}
    </tbody>

  </table>

  {% else %}
    <p>No comments yet.</p>
  {% endif %}

  <!-- LOGOUT -->
  <a href="/logout" class="btn btn-main">Logout</a>

</div>

</body>
</html>
