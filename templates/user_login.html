<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>User Login - MCA eConsultation</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* SAME STYLE AS REGISTER */

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family: "Inter","Segoe UI",sans-serif;

  background:
    radial-gradient(circle at 20% 20%, #092d47 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, #042940 0%, transparent 40%),
    linear-gradient(135deg,#11566b,#1e293b);
  color:white;
}

.card{
  width:420px;
  padding:40px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(25px);
  border-radius:24px;
  border:1px solid rgba(255,255,255,0.25);
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.title{
  font-size:26px;
  font-weight:700;
  text-align:center;
  background: linear-gradient(90deg,#ffffff,#a5b4fc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.form-control{
  background: rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.3);
  color:white;
  border-radius:14px;
}

.btn-main{
  width:100%;
  margin-top:12px;
  padding:12px;
  border-radius:14px;
  background: linear-gradient(135deg,#4f46e5,#7c3aed);
  color:white;
  border:none;
}

.alert{
  background: rgba(255,255,255,0.15);
  color:white;
}

</style>
</head>

<body>

<div class="card">

  <div class="title">User Login</div>

  <div id="flash"></div>

  <input id="mobile" class="form-control mb-2" placeholder="+91XXXXXXXXXX">

  <button class="btn-main" onclick="sendOTP()">Send OTP</button>

  <input id="otp" class="form-control mt-3" placeholder="Enter OTP">

  <button class="btn-main" onclick="login()">Login</button>

  <div class="text-center mt-3">
    <a href="/register" class="text-light">New user? Register</a>
  </div>

</div>

<script>
function show(msg,type="info"){
  document.getElementById("flash").innerHTML =
    `<div class="alert alert-${type} mt-2">${msg}</div>`;
}

function sendOTP(){
  const mobile = document.getElementById("mobile").value;
  const form = new FormData();
  form.append("mobile", mobile);

  fetch("/send-otp",{method:"POST",body:form})
  .then(r=>r.json())
  .then(d=>{
    if(d.status==="success") show("OTP Sent","success");
    else show("Error sending OTP","danger");
  });
}

function login(){
  const otp = document.getElementById("otp").value;
  const mobile = document.getElementById("mobile").value;

  const form = new FormData();
  form.append("otp", otp);
  form.append("mobile", mobile);

  fetch("/login-verify",{method:"POST",body:form})
  .then(r=>r.json())
  .then(d=>{
    if(d.status==="success") window.location.href=d.redirect;
    else show(d.message,"danger");
  });
}
</script>

</body>
</html>
