<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI';
            background: #f4f6fa;
        }
        .sidebar {
            width: 240px;
            height: 100vh;
            background: #1f2937;
            color: white;
            position: fixed;
            top: 0;
            left: 0;
            padding-top: 20px;
        }
        .sidebar a {
            color: white;
            display: block;
            padding: 12px 20px;
            text-decoration: none;
            font-size: 16px;
        }
        .sidebar a:hover {
            background: #374151;
        }
        .content {
            margin-left: 260px;
            padding: 25px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h4 class="text-center mb-4">Admin Panel</h4>
    <a href="/dashboard"><i class="fa fa-chart-line me-2"></i>Dashboard</a>
    <a href="/analyze"><i class="fa fa-chart-pie me-2"></i>Sentiment Charts</a>
   <a href="/wordcloud"><i class="fa fa-cloud me-2"></i>Word Cloud</a>
<a href="/summary"><i class="fa fa-file-lines me-2"></i>Summary</a>
<a href="/download-comments"><i class="fa fa-download me-2"></i>Download</a>
    <a href="/admin-logout" class="text-danger fw-bold">Logout</a>
</div>

<div class="content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
