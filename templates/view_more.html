<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ draft }} - Details | MCA eConsultation</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>


body{
  font-family: "Inter", "Segoe UI", sans-serif;
  margin:0;
  padding:0;
  min-height:100vh;

  background:
      radial-gradient(circle at 20% 20%, #092d47 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, #042940 0%, transparent 40%),
    linear-gradient(135deg,#11566b,#1e293b);
  background-attachment: fixed;
  color:#fff;
}

.navbar{
  background: rgba(255,255,255,0.08) !important;
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-bottom:1px solid rgba(255,255,255,0.2);
  box-shadow:0 8px 30px rgba(0,0,0,0.5);
}

.navbar-brand{
  font-size:20px;
  font-weight:700;
  background: linear-gradient(90deg,#fff,#c7d2fe);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.detail-card{
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);

  border-radius:22px;
  padding:30px;

  border:1px solid rgba(255,255,255,0.25);

  box-shadow:
    0 20px 60px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.3);

  animation: fadeIn .6s ease;
  transition:.4s ease;
}

.detail-card:hover{
  transform:translateY(-6px);
  box-shadow:
    0 30px 80px rgba(0,0,0,0.7),
    0 0 40px rgba(79,70,229,0.4);
}

h2{
  font-weight:700;
  background: linear-gradient(90deg,#ffffff,#a5b4fc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}


.text-muted{
  color:#cbd5e1 !important;
}

ul li{
  margin-bottom:12px;
  color:#e2e8f0;
}

.flow-box{
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  padding:12px 18px;
  border-radius:14px;
  margin-bottom:12px;
  border-left:4px solid #6366f1;
  font-weight:500;
  color:#fff;
  transition:.3s ease;
}

.flow-box:hover{
  transform:translateX(6px);
  background: rgba(99,102,241,0.25);
}

.pdf-btn{
  padding:12px 24px;
  border-radius:14px;
  font-weight:600;
  border:none;
  transition:.3s ease;
}

.btn-primary{
  background: linear-gradient(135deg,#4f46e5,#7c3aed);
  box-shadow:0 10px 30px rgba(79,70,229,0.5);
}

.btn-primary:hover{
  transform:translateY(-4px);
  box-shadow:0 15px 45px rgba(79,70,229,0.7);
}

.btn-success{
  background: linear-gradient(135deg,#06b6d4,#3b82f6);
  box-shadow:0 10px 30px rgba(6,182,212,0.5);
}

.btn-success:hover{
  transform:translateY(-4px);
  box-shadow:0 15px 45px rgba(6,182,212,0.7);
}


@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<nav class="navbar fixed-top bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold text-primary">MCA - eConsultation</a>
    <a href="/" class="btn btn-outline-secondary btn-sm">Home</a>
  </div>
</nav>


<div class="container" style="margin-top:110px; margin-bottom:40px;">

 
  <div class="detail-card mb-4">
      <h2 class="fw-bold text-primary">{{ draft }}</h2>
      <p class="text-muted fs-5">{{ data.description }}</p>
  </div>

  <div class="row g-4">

    
    <div class="col-md-6">
      <div class="detail-card">
        <h5 class="text-primary fw-bold">Key Highlights</h5>
        <ul class="mt-3">
          {% for p in data.points %}
            <li class="mb-2">{{ p }}</li>
          {% endfor %}
        </ul>
      </div>
    </div>

    
    <div class="col-md-6">
      <div class="detail-card">
        <h5 class="text-primary fw-bold">Process Flow</h5>
        <div class="mt-3">
          {% for f in data.flow %}
            <div class="flow-box">{{ f }}</div>
          {% endfor %}
        </div>
      </div>
    </div>

  </div>

 
  <div class="text-center mt-4">
    <a href="/pdfs/{{ data.pdf }}" class="btn btn-primary pdf-btn" download>
      📄 Download Full PDF
    </a>

    <a href="/verify?draft={{ draft }}" class="btn btn-success pdf-btn ms-2">
      ✏ Comment on this Draft
    </a>
  </div>

</div>

</body>
</html>
