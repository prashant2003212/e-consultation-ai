<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Admin Login - MCA eConsultation</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
/* ============================= */
/* SAME BACKGROUND AS REGISTER */
/* ============================= */
body {
margin: 0;
min-height: 100vh;

display: flex;
justify-content: center;
align-items: center;

font-family: "Inter","Segoe UI",sans-serif;
color: white;

background:
radial-gradient(circle at 20% 30%, rgba(99,102,241,0.25), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(168,85,247,0.25), transparent 40%),
radial-gradient(circle at 50% 50%, rgba(14,165,233,0.15), transparent 60%),
linear-gradient(135deg, #020617, #0f172a, #020617);

background-attachment: fixed;
}

/* ============================= */
/* GLASS CARD */
/* ============================= */
.admin-card{
width:420px;
padding:40px;

background: rgba(255,255,255,0.05);
backdrop-filter: blur(25px);

border-radius:24px;
border:1px solid rgba(255,255,255,0.1);

box-shadow:
0 20px 80px rgba(0,0,0,0.7),
inset 0 1px 0 rgba(255,255,255,0.1);

animation: fadeIn .6s ease;
}

/* ============================= */
/* TITLE */
/* ============================= */
.title{
font-size:36px;
font-weight:700;
text-align:center;

background: linear-gradient(90deg,#ffffff,#6366f1,#a855f7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
text-align:center;
color:#cbd5e1;
font-size:14px;
margin-bottom:25px;
}

/* ============================= */
/* INPUT FIELDS */
/* ============================= */
.form-control{
background: rgba(255,255,255,0.15);
border:1px solid rgba(255,255,255,0.3);
color:white;
border-radius:14px;
padding:12px;
}

.form-control:focus{
background: rgba(255,255,255,0.2);
border-color:#6366f1;
box-shadow:0 0 15px rgba(99,102,241,0.5);
color:white;
}

/* placeholder */
::placeholder {
color: rgba(255,255,255,0.7);
}

/* ============================= */
/* BUTTON */
/* ============================= */
.btn-login{
width:100%;
padding:13px;
margin-top:15px;
border-radius:14px;
font-weight:600;
font-size:16px;

background: linear-gradient(135deg,#6366f1,#a855f7);
border:none;
color:white;

transition:.3s;
}

.btn-login:hover{
transform:translateY(-3px);
box-shadow:0 10px 30px rgba(99,102,241,0.5);
}

/* ============================= */
/* ALERT */
/* ============================= */
.alert{
border-radius:12px;
background: rgba(255,255,255,0.15);
border:none;
color:white;
}

/* ============================= */
/* ANIMATION */
/* ============================= */
@keyframes fadeIn{
from{opacity:0; transform:translateY(25px);}
to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="admin-card">

  <div class="title">Admin Login</div>
  <div class="subtitle">Enter admin credentials to access dashboard</div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for c,m in messages %}
        <div class="alert alert-{{c}} alert-sm py-2">{{m}}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form action="/admin" method="post">
    
    <label class="fw-semibold mt-2">Username</label>
    <input name="username" class="form-control mb-3" required>

    <label class="fw-semibold">Password</label>
    <input type="password" name="password" class="form-control mb-3" required>

    <button class="btn-login">Login</button>

  </form>

</div>

</body>
</html>
