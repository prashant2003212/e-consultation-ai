<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Select Draft - eConsultation</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar shadow-sm fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-white" href="/">MCA - eConsultation</a>

        <div>
                {% if session.get("user") %}
                <a href="/profile" class="btn btn-outline-light btn-sm ms-2">Profile</a>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    {% else %}
        <a href="/login" class="btn btn-light btn-sm">Login</a>
        <a href="/register" class="btn btn-outline-light btn-sm ms-2">Register</a>
    {% endif %}
            <a href="/admin" class="btn btn-outline-light btn-sm">Admin</a>
        </div>
    </div>
</nav>

<div class="container app-container">
    <h2 class="mb-4 fw-bold text-white">Drafts / Amendments for Consultation</h2>

    <div class="draft-grid">
        {% for d in drafts %}
        <div class="draft-item">
    <div class="app-card fade-in-up">

        <img src="{{ url_for('static', filename='images/' ~ d.image) }}"
             class="draft-img" alt="{{ d.title }}">

        <div class="d-flex justify-content-between align-items-start">
            <div>
                <div class="draft-title">{{ d.title }}</div>
                <div class="draft-desc">{{ d.description }}</div>
            </div>
        </div>

        <div class="mt-3">
            <a href="/start-comment/{{ d.id }}" class="btn btn-primary btn-sm">Comment on this Draft</a>
            <a href="/view-more?draft={{ d.title }}" class="btn btn-outline-primary btn-sm ms-2">View More</a>
        </div>

    </div>
</div>


        {% endfor %}
    </div>
</div>

</body>
</html>
