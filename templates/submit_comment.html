<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Submit Comment - {{ draft }}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<style>


body{
  font-family: "Inter","Segoe UI",sans-serif;
  margin:0;
  padding:0;
  min-height:100vh;

  background:
    radial-gradient(circle at 20% 20%, #092d47 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, #042940 0%, transparent 40%),
    linear-gradient(135deg,#11566b,#1e293b);

  background-attachment: fixed;
  color:#fff;
}

.navbar{
  background: rgba(255,255,255,0.08) !important;
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-bottom:1px solid rgba(255,255,255,0.2);
  box-shadow:0 8px 30px rgba(0,0,0,0.5);
}

.navbar-brand{
  font-weight:700;
  background: linear-gradient(90deg,#fff,#c7d2fe);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}


.app-container{
  margin-top:120px;
  margin-bottom:60px;
}

.app-card{
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);

  border-radius:24px;
  padding:35px;

  border:1px solid rgba(255,255,255,0.25);

  box-shadow:
    0 20px 60px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.3);

  animation: fadeIn .6s ease;
}


h3{
  background: linear-gradient(90deg,#ffffff,#a5b4fc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.glass-box{
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  border-radius:16px;
  padding:18px;
  margin-bottom:18px;
  border:1px solid rgba(255,255,255,0.2);
}


.form-control{
  background: rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.3);
  color:#fff;
  border-radius:14px;
  padding:12px;
}

.form-control:focus{
  background: rgba(255,255,255,0.2);
  border-color:#6366f1;
  box-shadow:0 0 15px rgba(99,102,241,0.5);
  color:#fff;
}

textarea.form-control{
  resize:none;
}


input[type="radio"]{
  accent-color:#6366f1;
}


.btn-primary{
  background: linear-gradient(135deg,#4f46e5,#7c3aed);
  border:none;
  border-radius:14px;
  padding:12px 22px;
  font-weight:600;
  box-shadow:0 10px 30px rgba(79,70,229,0.5);
  transition:.3s ease;
}

.btn-primary:hover{
  transform:translateY(-4px);
  box-shadow:0 15px 45px rgba(79,70,229,0.7);
}

.btn-outline-danger{
  border-radius:14px;
  padding:12px 22px;
  border:1px solid rgba(255,255,255,0.4);
  color:#fff;
  background:rgba(255,255,255,0.1);
  transition:.3s ease;
}

.btn-outline-danger:hover{
  background:white;
  color:#0f172a;
}


@keyframes fadeIn{
  from{opacity:0; transform:translateY(25px);}
  to{opacity:1; transform:translateY(0);}
}

</style>
<body>


<nav class="navbar fixed-top shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-white">MCA - eConsultation</a>
    </div>
</nav>


<div class="container app-container">

    <div class="app-card fade-in-up" style="max-width:850px; margin:auto;">

        <h3 class="fw-bold text-primary">{{ draft }}</h3>

        
        <div class="mt-2 mb-3 p-3 rounded" style="background:#f8f9fa;">
            <strong>About this Draft:</strong>
            <p class="text-muted">{{ about }}</p>
        </div>

        
        <div class="p-3 rounded" style="background:#f8f9fa;">
            <label class="fw-bold">Submitting as:</label><br>
            <input type="radio" name="entityType" value="individual" checked onclick="toggleEntity()"> Individual  
            &nbsp;&nbsp;
            <input type="radio" name="entityType" value="company" onclick="toggleEntity()"> Company
        </div>

        <form method="post" class="mt-3">

           
            <input type="hidden" name="draft" value="{{ draft }}">
            <input type="hidden" name="mobile" value="{{ mobile }}">

           
            <div id="individualBox">
                <label class="fw-bold mt-3">Your Name</label>
                <input type="text" name="name" class="form-control mb-3" placeholder="Enter your name" required>

                <label class="fw-bold">Email</label>
                <input type="email" name="email" class="form-control mb-3" placeholder="Enter your email" required>
            </div>

           
            <div id="companyBox" style="display:none;">
                <label class="fw-bold mt-3">Company Name</label>
                <input type="text" name="company_name" class="form-control mb-3" placeholder="Enter company name">

                <label class="fw-bold">Company Email</label>
                <input type="email" name="company_email" class="form-control mb-3" placeholder="Enter official email">

                <label class="fw-bold">GST / CIN Number</label>
                <input type="text" name="company_id" class="form-control mb-3" placeholder="Enter GST/CIN">
            </div>

            
            <label class="fw-bold mt-3">Your Comment</label>
            <textarea name="comment" class="form-control mb-3" placeholder="Write your feedback..." style="height:180px;"></textarea>

            <button type="submit" class="btn btn-primary">Submit Comment</button>
            <a href="/" class="btn btn-outline-danger ms-2">Cancel</a>

        </form>

    </div>

</div>


<script>
function toggleEntity() {
    const type = document.querySelector('input[name="entityType"]:checked').value;

    document.getElementById("individualBox").style.display = 
        (type === "individual") ? "block" : "none";

    document.getElementById("companyBox").style.display = 
        (type === "company") ? "block" : "none";
}
</script>

</body>
</html>
